<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="猪宝">
<title>猪宝</title>
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.webmanifest">
<script>
// 强制版本检查：绕过旧SW缓存，检测到新版就清缓存+注销SW+刷新
window.APP_VERSION = "v16.2";
(async function() {
  try {
    // 加时间戳参数绕过SW的cache-first（缓存里没有带参数的URL，会走网络）
    const res = await fetch("sw.js?t=" + Date.now(), { cache: "no-store" });
    const txt = await res.text();
    const m = txt.match(/v(\d+\.\d+)/);
    if (m) {
      const latest = "v" + m[1];
      if (latest !== window.APP_VERSION) {
        // 有新版 → 清除所有缓存 + 注销SW → 强制刷新
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        location.reload();
      }
    }
  } catch(e) {}
})();
</script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --brand-green: #2DA968;
    --brand-green-light: #E8F5ED;
    --brand-green-dark: #268F5A;
    --bg-page: #F8F9FA;
    --bg-white: #FFFFFF;
    --text-title: #1D1D1F;
    --text-primary: #333333;
    --text-secondary: #666666;
    --text-tertiary: #86868B;
    --text-placeholder: #C7C7CC;
    --border-light: #E5E5EA;
    --radius-lg: 16px;
    --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.05);
  }
  html, body { margin: 0; height: 100%; font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; }
  body {
    background: var(--bg-page); color: var(--text-primary);
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }

  /* ===== 全屏滚动容器：独立overflow-y:auto，禁止body原生滚动 ===== */
  /* 行业公认缓解iOS PWA底部偏移的最佳实践——独立滚动容器 + 硬件加速 */
  #appWrapper {
    height: 100vh; overflow-y: auto; display: flex; flex-direction: column;
    -webkit-overflow-scrolling: touch;
  }

  /* ===== 顶栏（vue-app 1:1 浅色） ===== */
  .top {
    background: var(--bg-page);
    padding: 12px 16px;
    padding-top: calc(12px + env(safe-area-inset-top));
    display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 10; flex-shrink: 0;
    border-bottom: 0.5px solid var(--border-light);
  }
  .nav-hamburger {
    width: 38px; height: 38px; display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center; gap: 6px; padding-left: 9px;
    cursor: pointer; border-radius: 50%; background: #fff;
    box-shadow: 0 2px 10px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
    transition: transform .15s; flex-shrink: 0;
  }
  .nav-hamburger:active { transform: scale(.92); }
  .nav-hamburger span { display: block; height: 2.5px; background: #1a1a1a; border-radius: 1.5px; }
  .nav-hamburger span:first-child { width: 20px; }
  .nav-hamburger span:last-child { width: 13px; }

  .nav-brand { flex: 1; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding-left: 12px; cursor: pointer; }
  .nav-brand:active { opacity: .7; }
  .nav-title { margin: 0; font-size: 19px; font-weight: 700; color: var(--text-title); line-height: 1.2; letter-spacing: -.2px; }
  .nav-subtitle { margin: 0; font-size: 13px; color: var(--text-tertiary); letter-spacing: .2px; }

  .nav-sound-btn {
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 50%; background: #fff;
    box-shadow: 0 2px 10px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
    transition: transform .15s; flex-shrink: 0; border: none;
  }
  .nav-sound-btn:active { transform: scale(.92); }
  .nav-sound-btn svg { width: 22px; height: 22px; fill: #1a1a1a; }
  .speaker-slash { stroke: #1a1a1a; stroke-width: 2.2; stroke-linecap: round; }
  .nav-sound-btn:not(.active) .speaker-slash { display: block; }
  .nav-sound-btn.active .speaker-slash { display: none; }

  /* 状态条 */
  .statusbar {
    flex-shrink: 0; font-size: 12px; color: var(--text-tertiary);
    padding: 5px 14px; background: var(--bg-page); border-bottom: 0.5px solid var(--border-light);
    display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #C9C9C9; flex-shrink: 0; transition: background .2s; }
  .dot.ok { background: #34C759; }
  .dot.loading { background: #FF9F0A; animation: pulse 1s infinite; }
  .dot.bad { background: #FF3B30; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ===== 聊天区 ===== */
  .chat { flex: 1; overflow-y: auto; padding: 16px 14px 8px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 88%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .bubble { padding: 11px 14px; border-radius: 18px; font-size: 15px; line-height: 1.55; word-break: break-word; -webkit-user-select: text; user-select: text; }
  .msg.ai .bubble { background: var(--bg-white); border-radius: 4px 18px 18px 18px; box-shadow: 0 1px 4px rgba(0,0,0,.04); color: var(--text-primary); position: relative; padding-right: 36px; }
  .msg.user .bubble { background: var(--brand-green); color: #fff; border-radius: 18px 4px 18px 18px; }
  /* 删除按钮（AI 气泡右下角，对齐 vue-app） */
  .msg-del {
    position: absolute; right: 4px; bottom: 4px;
    width: 28px; height: 28px; border: none; border-radius: 50%;
    background: transparent; color: #86868B; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.55; transition: background .2s, color .2s, transform .15s;
  }
  .msg-del:active { background: rgba(255,59,48,.18); color: #FF3B30; transform: scale(.9); opacity: 1; }
  .msg-del svg { width: 16px; height: 16px; fill: none; }
  .typing span { display: inline-block; width: 6px; height: 6px; margin: 0 2px; background: var(--text-tertiary); border-radius: 50%; animation: b 1.2s infinite; }
  .typing span:nth-child(2){ animation-delay:.2s } .typing span:nth-child(3){ animation-delay:.4s }
  @keyframes b { 0%,60%,100%{ opacity:.3; transform: translateY(0) } 30%{ opacity:1; transform: translateY(-4px) } }
  .ref-tag { display: inline-block; font-size: 11px; color: var(--brand-green); background: var(--brand-green-light); border-radius: 6px; padding: 1px 6px; margin-bottom: 4px; }
  /* 消息内链接 + 一键复制 */
  .msg-link { color: var(--brand-green); text-decoration: none; word-break: break-all; border-bottom: 1px solid var(--brand-green-light); }
  .msg.user .bubble .msg-link { color: #eafff2; border-bottom-color: rgba(255,255,255,.5); }
  .link-copy { display: inline-block; margin-left: 6px; border: none; background: var(--brand-green); color: #fff; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 8px; cursor: pointer; vertical-align: middle; transition: background .15s, transform .1s; flex-shrink: 0; }
  .msg.user .bubble .link-copy { background: rgba(255,255,255,.22); }
  .link-copy:active { background: var(--brand-green-dark); transform: scale(.94); }
  .msg.user .bubble .link-copy:active { background: rgba(255,255,255,.35); }
  .link-line { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  /* 欢迎页（vue-app 对齐） */
  .hero { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 14vh; padding-bottom: 24px; text-align: center; }
  .hero.hidden { display: none !important; }
  .pig-wrap {
    width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 50% 35%, #FFFFFF 0%, #FFE7EC 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 30px rgba(255,107,129,.14);
    animation: float 3.4s ease-in-out infinite;
  }
  .pig-wrap svg { width: 120px; height: 120px; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .greeting { margin: 20px 0 0; font-size: 21px; font-weight: 600; letter-spacing: .3px; color: #1F2329; }

  /* AI/用户消息气泡（vue-app 对齐） */

  /* ===== 底部 Tab 栏（vue-app 1:1 浅色） ===== */
  .tabs {
    display: flex; gap: 6px; padding: 12px 16px;
    background: var(--bg-page); flex-shrink: 0; overflow-x: auto;
    border-top: 0.5px solid var(--border-light);
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    display: flex; align-items: center; gap: 6px; padding: 10px 16px;
    background: var(--bg-white); border-radius: var(--radius-lg);
    cursor: pointer; transition: all .2s; border: none; font-size: 14px;
    color: var(--text-secondary); font-weight: 500; flex-shrink: 0;
  }
  .tab-btn:active { transform: scale(.96); }
  .tab-btn.active { background: var(--brand-green-light); color: var(--brand-green); font-weight: 600; }
  .tab-btn svg { width: 16px; height: 16px; stroke-width: 1.5; stroke: currentColor; fill: none; }

  /* ===== 输入栏（vue-app 1:1） ===== */
  .input-bar {
    background: var(--bg-page); padding: 2px 12px;
    padding-bottom: 2px; flex-shrink: 0; width: 100%;
  }
  /* ===== 底部区域容器（不用position:fixed，靠JS控制body高度+flexbox推底） ===== */
  .bottom-area {
    flex-shrink: 0;
    background: var(--bg-page);
    padding-bottom: calc(env(safe-area-inset-bottom) + 3px);
    z-index: 10;
    /* 硬件加速层：独立GPU合成，绕过WebKit渲染缓存bug，大幅降低键盘弹出底部偏移概率 */
    transform: translateZ(0);
  }
  /* 内容区可滚动，不被底部遮挡 */
  #chatPanel, #knowledgePanel { padding-bottom: 8px !important; }
  /* 模型下载状态提示条 */
  .model-dl-hint {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 12px 2px; font-size: 11px; color: #F59E0B;
    user-select: none;
  }
  .model-dl-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #F59E0B;
    animation: dlPulse 1s ease-in-out infinite;
  }
  @keyframes dlPulse { 0%,100%{opacity:.4}50%{opacity:1} }
  .input-wrap {
    background: var(--bg-white); border-radius: 12px;
    display: flex; align-items: center; padding: 3px 6px; box-shadow: var(--shadow-sm);
    transition: box-shadow .25s;
  }
  .input-wrap:focus-within { box-shadow: 0 4px 16px rgba(45,169,104,.12); }
  .input-wrap textarea {
    flex: 1; border: none; background: transparent; padding: 6px 4px;
    font-size: 16px; line-height: 1.4; color: var(--text-primary); outline: none;
    resize: none; max-height: 88px; min-height: 20px; overflow-y: auto;
    font-family: inherit; -webkit-user-select: text; user-select: text;
  }
  .input-wrap textarea::-webkit-scrollbar { display: none; }
  .input-wrap textarea::placeholder { color: var(--text-placeholder); font-size: 14px; }
  /* 输入区按钮：有线输入＋发送 */
  .input-voice-btn {
    width: 38px; height: 38px; border-radius: 50%; background: transparent; border: none;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: all .2s; flex-shrink: 0; position: relative;
  }
  .input-voice-btn:active { background: rgba(0,0,0,.06); transform: scale(.94); }
  .input-voice-btn svg { width: 22px; height: 22px; stroke: #007AFF; fill: none; stroke-width: 1.5; transition: stroke .2s; }
  /* 语音聊天中状态：红色脉冲 + 挂断图标 */
  .input-voice-btn.voice-chat-active { background: rgba(245,63,63,.12); }
  .input-voice-btn.voice-chat-active svg { stroke: #F53F3F; }
  @keyframes voicePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245,63,63,.35); }
    50% { box-shadow: 0 0 0 8px rgba(245,63,63,0); }
  }
  .input-voice-btn.voice-chat-active::after {
    content: ""; position: absolute; inset: -4px; border-radius: 50%;
    border: 2px solid rgba(245,63,63,.4);
    animation: voicePulse 1.4s ease-out infinite;
    pointer-events: none;
  }
  /* 语音不支持时禁用态 */
  .input-voice-btn.disabled { opacity: 0.35; cursor: not-allowed; }
  .input-voice-btn.disabled:active { transform: none; background: transparent; }
  /* 正在听——绿色呼吸动画 */
  .input-voice-btn.listening { background: rgba(52,199,89,.15); }
  .input-voice-btn.listening svg { stroke: #34C759; }
  .input-voice-btn.listening::after {
    content: ""; position: absolute; inset: -4px; border-radius: 50%;
    border: 2px solid rgba(52,199,89,.4);
    animation: voicePulse 1.4s ease-out infinite;
    pointer-events: none;
  }
  .input-send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--brand-green); border: none;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    flex-shrink: 0; transition: all .2s;
    box-shadow: 0 2px 8px rgba(45,169,104,.2);
  }
  .input-send-btn:active { transform: scale(.92); background: var(--brand-green-dark); }
  .input-send-btn svg { width: 18px; height: 18px; fill: #fff; stroke: none; }

  /* ===== 面板（Tab 切换） ===== */
  .panel { display: none; flex: 1; overflow-y: auto; padding: 16px 14px; flex-direction: column; }
  .panel.show { display: flex; }

  /* 知识库 */
  .kb-header { display: flex; align-items: center; gap: 8px; font-size: 17px; font-weight: 600; margin-bottom: 12px; }
  .kb-back { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border-light); background: var(--bg-white); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all .2s; }
  .kb-back:active { background: #F0F0F0; transform: scale(.92); }
  .kb-back svg { width: 18px; height: 18px; }
  .kb-label { font-size: 13px; color: var(--text-tertiary); margin-bottom: 6px; }
  .kb-text { width: 100%; border: 1px solid var(--border-light); border-radius: 12px; padding: 12px; font: inherit; font-size: 14px; min-height: 90px; resize: vertical; background: var(--bg-white); }
  .kb-btn { width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 12px; background: var(--brand-green); color: #fff; font-size: 15px; font-weight: 600; }
  .kb-btn:active { background: var(--brand-green-dark); }
  .kb-btn:disabled { background: #C9C9C9; }
  .kb-list { margin-top: 14px; }
  .kb-item { background: var(--bg-white); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .kb-item .t { font-size: 14px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .kb-item .d { font-size: 13px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; -webkit-user-select: text; user-select: text; }
  .kb-item .del { color: #FF3B30; border: none; background: none; font-size: 13px; padding: 4px 8px; border-radius: 6px; }
  .kb-item .del:active { background: rgba(255,48,48,.08); }
  .kb-empty { font-size: 13px; color: var(--text-tertiary); text-align: center; padding: 40px 0; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-top: 0.5px solid var(--border-light); font-size: 14px; }
  .switch { width: 46px; height: 27px; border-radius: 14px; background: #C9C9C9; position: relative; transition: background .2s; flex-shrink: 0; cursor: pointer; }
  .switch.on { background: var(--brand-green); }
  .switch::after { content: ""; position: absolute; width: 23px; height: 23px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
  .switch.on::after { left: 21px; }

  /* ===== 设置弹窗 ===== */
  .setup { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 60; display: none; align-items: center; justify-content: center; padding: 20px; }
  .setup.open { display: flex; }
  .setup-box { background: #fff; border-radius: 16px; padding: 15px 14px; width: 100%; max-width: 360px; max-height: 92vh; overflow-y: auto; }
  .setup-box h3 { margin: 0 0 8px; font-size: 16px; }
  .setup-box label { font-size: 12px; color: var(--text-tertiary); display: block; margin-bottom: 2px; font-weight: 500; }
  .setup-box select, .setup-box input { width: 100%; border: 1px solid var(--border-light); border-radius: 10px; padding: 8px; font-size: 14px; margin-bottom: 7px; background: var(--bg-white); }
  /* 底部操作栏：保存 / 测试连接 / 清空对话 —— 横排紧凑，文字竖排 */
  .setup-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: center; }
  .setup-actions button {
    width: 40px; height: 68px; padding: 4px 0; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: opacity .15s, transform .08s;
    writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 2px;
    display: flex; align-items: center; justify-content: center; flex: none;
  }
  .setup-actions button:active { opacity: .75; transform: scale(.96); }
  .setup-actions .btn-save { background: #34C759; color: #fff; }       /* 绿色-保存 */
  .setup-actions .btn-test { background: #007AFF; color: #fff; }        /* 蓝色-测试 */
  .setup-actions .btn-danger { background: #FF3B30; color: #fff; }      /* 红色-清空 */
  .setup-divider { display: flex; align-items: center; color: var(--text-tertiary); font-size: 12px; margin: 10px 0 6px; }
  .setup-divider::before, .setup-divider::after { content: ""; flex: 1; height: 0.5px; background: var(--border-light); }
  .setup-divider span { padding: 0 10px; }

  /* ===== 历史抽屉（汉堡弹出，对齐 vue-app） ===== */
  .sidemask { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 45; opacity: 0; pointer-events: none; transition: opacity .25s; }
  .sidemask.open { opacity: 1; pointer-events: auto; }
  .sidebar { position: fixed; top: 0; left: 0; height: 100%; width: 85%; max-width: 360px; background: var(--bg-white); z-index: 50; transform: translateX(-100%); transition: transform .28s cubic-bezier(0.22,0.61,0.36,1); display: flex; flex-direction: column; box-shadow: 2px 0 20px rgba(0,0,0,.12); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-head { padding: calc(18px + env(safe-area-inset-top)) 18px 14px; border-bottom: 0.5px solid var(--border-light); flex-shrink: 0; }
  .sidebar-head h3 { margin: 0; font-size: 18px; font-weight: 700; color: var(--text-title); }
  .side-new-btn { margin: 10px 16px; padding: 13px; border: 1px dashed var(--brand-green); border-radius: 14px; background: var(--brand-green-light); color: var(--brand-green); font-size: 15px; font-weight: 600; text-align: center; cursor: pointer; flex-shrink: 0; }
  .side-new-btn:active { background: #d4edde; }
  .side-list { flex: 1; overflow-y: auto; padding: 0 16px 8px; }
  .side-group-label { font-size: 12px; color: var(--text-tertiary); font-weight: 500; padding: 10px 4px 6px; }
  .side-session { background: var(--bg-page); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: background .15s; }
  .side-session:active { background: #e9ecef; }
  .side-session .ss-top { display: flex; align-items: center; justify-content: space-between; }
  .side-session .ss-title { font-size: 15px; font-weight: 600; color: var(--text-title); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .side-session .ss-del { flex-shrink: 0; width: 28px; height: 28px; border: none; border-radius: 50%; background: transparent; color: #86868B; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; opacity: 0.55; transition: background .2s, color .2s, transform .15s; }
  .side-session .ss-del:active { background: rgba(255,59,48,.18); color: #FF3B30; transform: scale(.9); opacity: 1; }
  .side-session .ss-del svg { width: 16px; height: 16px; fill: none; }
  .side-session .ss-preview { font-size: 13px; color: var(--text-secondary); margin-top: 6px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .side-session .ss-time { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
  .side-empty { text-align: center; padding: 40px 0; font-size: 13px; color: var(--text-tertiary); }
  /* 抽屉底部操作行 */
  .side-footer { flex-shrink: 0; padding: 0 16px calc(12px + env(safe-area-inset-bottom)); display: flex; justify-content: center; }
  .side-footer button { padding: 11px 24px; border-radius: 12px; border: 1px solid var(--border-light); background: var(--bg-white); font-size: 13px; color: var(--text-secondary); cursor: pointer; }

<script type="module">
"use strict";

/* ============ 配置 ============ */
const LS_CFG = "zhubao_cfg";
const MODEL_MAP = {
  "0.5B":  "onnx-community/Qwen2.5-0.5B-Instruct",
  "1.5B":  "onnx-community/Qwen2.5-1.5B-Instruct",
  "3B代码": "onnx-community/Qwen2.5-Coder-3B-Instruct"
};
function defaultCfg() {
  return {
    model: "", customModel: "", mirror: "https://hf-mirror.com",
    device: /iPhone|iPad|iPod/i.test(navigator.userAgent) ? "wasm" : "webgpu",
    // 是否已手动选择模型：默认 false，发消息不触发任何模型；需手动打开设置选本地/云端并保存后才生效
    modelChosen: false,
    // 云端 API 配置（免下载，直接调用厂商接口）
    apiEnabled: false,
    apiProvider: "deepseek",
    apiModel: "deepseek-v4-flash",
    apiUrl: "https://api.deepseek.com/chat/completions",
    apiKey: "",
    apiProxy: "",
    // 朗读声音：空字符串=自动选最优中文音色；否则存所选 voice 的 voiceURI（跨版本稳定）
    voiceURI: ""
  };
}
// 合并旧配置：已存字段覆盖默认值，缺失字段自动补默认（避免旧用户丢字段）
let cfg = Object.assign(defaultCfg(), JSON.parse(localStorage.getItem(LS_CFG) || "null") || {});
const saveCfg = () => localStorage.setItem(LS_CFG, JSON.stringify(cfg));
function currentModelId() {
  if (cfg.model === "custom") return cfg.customModel.trim() || MODEL_MAP["1.5B"];
  return MODEL_MAP[cfg.model] || MODEL_MAP["1.5B"];
}

/* ============ 云端 API（OpenAI 兼容 / 流式 SSE） ============ */
const API_PRESETS = {
  deepseek: {
    label: "DeepSeek", url: "https://api.deepseek.com/chat/completions",
    recommended: "deepseek-v4-flash", keyph: "sk-...（DeepSeek 控制台获取）",
    models: ["deepseek-v4-flash", "deepseek-v4-pro", "deepseek-chat（2026-07-24停用）", "deepseek-reasoner（2026-07-24停用）"]
  },
  doubao: {
    label: "豆包（火山方舟）", url: "https://ark.cn-beijing.volces.com/api/v3/chat/completions",
    recommended: "doubao-seed-1-6-251015", keyph: "火山引擎方舟 API Key",
    models: ["doubao-seed-2-0-pro-260215", "doubao-seed-1-8-251228", "doubao-seed-1-6-251015", "doubao-seed-1-6-flash-250828", "doubao-seed-1-6-lite-251015", "doubao-1.5-pro-32k", "doubao-1.5-lite-32k"]
  },
  openai: {
    label: "OpenAI", url: "https://api.openai.com/v1/chat/completions",
    recommended: "gpt-5.4", keyph: "sk-...（OpenAI 平台获取）",
    models: ["gpt-5.5", "gpt-5.5-pro", "gpt-5.4", "gpt-5.4-mini", "gpt-5.4-nano", "gpt-4.1", "o3"]
  },
  qwen: {
    label: "通义千问", url: "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions",
    recommended: "qwen-plus", keyph: "sk-...（阿里云百炼平台获取）",
    models: ["qwen-max", "qwen-plus", "qwen-turbo", "qwen-long", "qwen-flash", "qwq-plus"]
  },
  custom: {
    label: "自定义（OpenAI 兼容）", url: "", recommended: "", keyph: "API Key", models: []
  }
};
// 输入模型名 → 自动识别厂商并回填地址
function guessProvider(name) {
  const n = (name || "").toLowerCase();
  if (n.includes("deepseek")) return "deepseek";
  if (n.includes("doubao") || n.includes("豆包") || n.includes("ark") || n.includes("ep-")) return "doubao";
  if (n.includes("gpt") || n.includes("openai")) return "openai";
  if (n.includes("qwen") || n.includes("通义") || n.includes("dashscope")) return "qwen";
  return cfg.apiProvider || "custom";
}
// 拼接最终请求地址（支持代理：{url} 占位 或 ?url= 拼接）
function buildApiUrl() {
  const base = (cfg.apiUrl || "").trim();
  const proxy = (cfg.apiProxy || "").trim();
  if (!proxy) return base;
  if (proxy.includes("{url}")) return proxy.replace("{url}", encodeURIComponent(base));
  return proxy + (proxy.includes("?") ? "&" : "?") + "url=" + encodeURIComponent(base);
}
async function runModelCloud(messages, onToken) {
  if (!cfg.apiKey) throw new Error("未填写 API Key，请到设置 → 云端 API 填写");
  const url = buildApiUrl();
  if (!url) throw new Error("API 地址为空，请到设置 → 云端 API 填写");
  let res;
  try {
    res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + cfg.apiKey },
      body: JSON.stringify({ model: cfg.apiModel || "", messages, stream: true })
    });
  } catch (e) {
    throw new Error("网络/CORS 错误：" + (e.message || e) + "（请检查 API 地址是否正确，或确认网络可访问该地址）");
  }
  if (!res.ok) {
    let detail = "";
    try { const j = await res.json(); detail = j.error?.message || j.message || JSON.stringify(j).slice(0, 120); } catch {}
    throw new Error("API 返回 " + res.status + (detail ? "：" + detail : "") + "（检查 Key / 模型名 / 地址）");
  }
  // 流式解析（SSE：data: {...}）
  if (res.body) {
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let acc = "", buffer = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buffer.indexOf("\n")) >= 0) {
        const line = buffer.slice(0, idx).trim();
        buffer = buffer.slice(idx + 1);
        if (!line.startsWith("data:")) continue;
        const data = line.slice(5).trim();
        if (data === "[DONE]") continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || "";
          if (delta) { acc += delta; onToken(acc); }
        } catch {}
      }
    }
    if (!acc) throw new Error("API 返回为空（可能模型名/地址不对）");
    return acc;
  }
  // 非流式兜底
  const j = await res.json();
  const txt = j.choices?.[0]?.message?.content || "";
  if (!txt) throw new Error("API 返回为空（可能模型名/地址不对）");
  return txt;
}

/* ============ 多会话历史（对齐 vue-app） ============ */
const SESSIONS_KEY = "zhubao_sessions_v1";
const SESSION_LIMIT = 100;
let sessions = [];
let activeSessionId = null;
function loadSessions() {
  try {
    const raw = localStorage.getItem(SESSIONS_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      sessions = Array.isArray(data.sessions) ? data.sessions : [];
      activeSessionId = data.activeId || null;
    }
    // 迁移旧单条历史 → 多会话
    if (!sessions.length) {
      const old = localStorage.getItem("zhubao_history");
      if (old) {
        const oldMsgs = JSON.parse(old);
        if (Array.isArray(oldMsgs) && oldMsgs.length) {
          const title = (oldMsgs.find(m => m.role === "user")?.content || "").slice(0, 12) || "旧对话";
          sessions.push({ id: "s_" + Date.now().toString(36), title, messages: oldMsgs, createdAt: Date.now(), updatedAt: Date.now() });
          localStorage.removeItem("zhubao_history");
        }
      }
    }
    if (!sessions.length) {
      const id = "s_" + Date.now().toString(36);
      sessions.push({ id, title: "新对话", messages: [], createdAt: Date.now(), updatedAt: Date.now() });
    }
    if (!activeSessionId || !sessions.some(s => s.id === activeSessionId)) {
      activeSessionId = sessions[0].id;
    }
  } catch { sessions = []; activeSessionId = null; }
}
function persistSessions() { localStorage.setItem(SESSIONS_KEY, JSON.stringify({ sessions, activeId: activeSessionId })); }
function activeSession() { return sessions.find(s => s.id === activeSessionId) || sessions[0]; }
function pushHistory(role, content) {
  const s = activeSession();
  s.messages.push({ role, content });
  if (s.messages.length > 32) s.messages = s.messages.slice(s.messages.length - 32);
  s.updatedAt = Date.now();
  // 首条用户消息自动命名
  if (!s.title || s.title === "新对话") {
    const firstUser = s.messages.find(m => m.role === "user");
    if (firstUser) s.title = (firstUser.content || "").replace(/\s+/g, " ").trim().slice(0, 12) || "新对话";
  }
  persistSessions();
}
// 把内部存储的 role 归一化为标准 role（'ai' → 'assistant'），云端 OpenAI 兼容接口只认 system/user/assistant
function normRole(r) { return r === "ai" ? "assistant" : (r || "user"); }
function historyMessages() { return activeSession().messages.slice(0, -1).map(m => ({ role: normRole(m.role), content: m.content })); }

/* ============ 语音朗读（Web Speech API，对齐 vue-app） ============ */
let speechEnabled = false;
let speechVoices = [];
if ("speechSynthesis" in window) {
  speechVoices = window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => { speechVoices = window.speechSynthesis.getVoices(); if ($("#setup").classList.contains("open")) refreshVoiceOptions(); };
}
function selectBestVoice() {
  // 用户手动指定了声音 → 优先用（按 voiceURI 精确匹配，跨系统版本稳定）
  if (cfg.voiceURI) {
    const sv = speechVoices.find(v => v.voiceURI === cfg.voiceURI);
    if (sv) return sv;
  }
  // 优选列表只放女声明，越靠前越自然
  // 优先"月/悦/Yue"高音质女声（用户指定默认）→ 再 iOS 美佳/婷婷 → 微软小晓 → 其余兜底
  const preferred = ["Yue", "月", "悦", "Mei-Jia", "Meijia", "Ting-Ting", "Tingting", "Xiaoxiao", "Yaoyao", "Sin-Ji", "Google 普通话", "Microsoft"];
  for (const name of preferred) {
    const v = speechVoices.find(v => v.name.includes(name) || (v.voiceURI || "").includes(name));
    if (v) return v;
  }
  // 兜底：取第一个中文女声（已在 refreshVoiceOptions 中过滤掉男声）
  const female = speechVoices.filter(v => (v.lang || "").toLowerCase().startsWith("zh") && !MALE_VOICE_RE.test(v.name + " " + (v.voiceURI || "")));

// 已知男声明（用于排除）：iOS 的 Yunyang/Kangkang、Android 的 "Male"、中文名含「男」
const MALE_VOICE_RE = /yunyang|kang|kangkang|dashan|男|male/i;

// 打开设置时刷新「朗读声音」下拉（只列女声，重读 getVoices 以兼容 iOS 异步加载）

  const YUE_RE = /月|yue|悦/i;
  const female = speechVoices.filter(v => {
    const lang = (v.lang || "").toLowerCase();
    const nameUri = v.name + " " + (v.voiceURI || "");

  const yueVoice = female.find(v => YUE_RE.test(v.name + " " + (v.voiceURI || "")));

}

/* ============ IndexedDB 知识库 ============ */
const DB = "zhubao_kb", STORE = "summaries";
function openDB() { return new Promise((res, rej) => { const r = indexedDB.open(DB, 1); r.onupgradeneeded = () => r.result.createObjectStore(STORE, { keyPath: "id" }); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
async function dbAll() { const db = await openDB(); return new Promise((res, rej) => { const tx = db.transaction(STORE, "readonly").objectStore(STORE).getAll(); tx.onsuccess = () => res(tx.result.sort((a, b) => b.ts - a.ts)); tx.onerror = () => rej(tx.error); }); }
async function dbPut(item) { const db = await openDB(); return new Promise((res, rej) => { const tx = db.transaction(STORE, "readwrite").objectStore(STORE).put(item); tx.onsuccess = () => res(); tx.onerror = () => rej(tx.error); }); }
async function dbDel(id) { const db = await openDB(); return new Promise((res, rej) => { const tx = db.transaction(STORE, "readwrite").objectStore(STORE).delete(id); tx.onsuccess = () => res(); tx.onerror = () => rej(tx.error); }); }

/* ============ transformers.js WebGPU 推理 ============ */
let lib = null, libFailed = false, generator = null, modelLoading = false;
let modelLoadStart = 0; // 模型下载开始时间，用于进度条显示已用时长
let pendingSends = [];  // 模型下载中排队的消息，下完自动发送
const CDN_URLS = [
  "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3",
  "https://unpkg.com/@huggingface/transformers@3",
  "https://esm.sh/@huggingface/transformers@3"
];
function getMirrorList() {
  const userMirror = (cfg.mirror || "").replace(/\/+$/, "");
  const list = [];
  if (userMirror) list.push(userMirror);
  if (!list.includes("https://huggingface.co")) list.push("https://huggingface.co");
  if (userMirror !== "https://hf-mirror.com" && !list.includes("https://hf-mirror.com")) list.push("https://hf-mirror.com");
  return list.length ? list : ["https://huggingface.co"];
}
async function loadLib() {
  if (lib) return lib;
  if (libFailed) throw new Error("模型库加载失败");
  let lastErr;
  for (const url of CDN_URLS) {
    try { setStatus("正在加载模型库…", "loading"); lib = await import(url); return lib; }
    catch (e) { lastErr = e; }
  }
  libFailed = true; setStatus("模型库加载失败（请检查网络）", "bad");
  throw lastErr || new Error("所有CDN源均不可用");
}
async function ensureModel() {
  if (generator) return generator;
  if (modelLoading) { while (modelLoading && !generator) await new Promise(r => setTimeout(r, 200)); if (generator) return generator; }
  modelLoading = true;
  modelLoadStart = Date.now();
  $("#modelDlHint").style.display = "flex";
  const mirrors = getMirrorList();
  let lastErr;
  // 多种 dtype 依次尝试，哪个能在当前设备跑就用哪个（兼容性兜底）
  const DTYPES = ["q4f16", "q4", "q8", "fp16", "fp32"];
  // 总超时 30 分钟：弱网/VPN 下 385MB 的 1.5B 模型可能需 15-20 分钟，放宽避免被掐断
  const TOTAL_TIMEOUT = 1800000;
  const MAX_ATTEMPTS = 2; // 下载中断自动重试一次（已下载的缓存文件会跳过）
  let attempt = 0;
  while (attempt < MAX_ATTEMPTS) {
    attempt++;
    if (attempt > 1) toast("下载中断，正在自动重试（" + attempt + "/" + MAX_ATTEMPTS + "），已下载的文件会跳过");
    const startTime = Date.now();
    for (const mirror of mirrors) {
      try {
        setStatus(`正在从 ${new URL(mirror).hostname} 下载模型…`, "loading");
        $("#modelDlText").textContent = `正在从 ${new URL(mirror).hostname} 下载模型…（第${attempt}次）`;
        const { pipeline, env } = await loadLib();
        env.remoteHost = mirror;
        env.allowRemoteModels = true;
        let dev = cfg.device;
        // iOS Safari 的 WebGPU 不成熟，强制用 WASM，避免反复重试浪费下载时间
        if (/iPhone|iPad|iPod/i.test(navigator.userAgent) && dev === "webgpu") dev = "wasm";
        let loaded = false;
        for (const dt of DTYPES) {
          // 检查是否已超总时间
          const elapsed = Date.now() - startTime;
          if (elapsed > TOTAL_TIMEOUT) throw new Error("下载超时（30分钟未完成，请检查网络或切换更小的模型）");
          try {
            $("#modelDlText").textContent = `正在从 ${new URL(mirror).hostname} 下载模型…（格式 ${dt}）`;
            const remaining = TOTAL_TIMEOUT - elapsed;
            const dlPromise = pipeline("text-generation", currentModelId(), { device: dev, dtype: dt, num_threads: 1, progress_callback: onProgress });
            const timeoutPromise = new Promise((_, rej) => setTimeout(() => rej(new Error("下载超时")), Math.max(remaining, 120000)));
            generator = await Promise.race([dlPromise, timeoutPromise]);
            loaded = true;
            break;
          } catch (de) {
            lastErr = de;
            if (/超时/.test(de.message || "")) throw de; // 总超时，不再试其他格式
            // 初始化失败 → 试下一种格式（文件可能已缓存，很快）
          }
        }
        if (!loaded) throw lastErr || new Error("所有模型格式均加载失败");
        modelLoading = false;
        $("#modelDlHint").style.display = "none";
        setStatus("模型已就绪 · " + (dev === "webgpu" ? "WebGPU" : "WASM"), "ok");
        updateModelPickText();
        toast(dev === "webgpu" ? "✅ 模型已就绪（WebGPU），可以开始聊天了" : "✅ 模型已就绪（WASM），可以开始聊天了");
        // 自动发送排队消息
        flushPendingSends();
        return generator;
      } catch (e) {
        lastErr = e;
        if (/webgpu/i.test(e.message || "") && cfg.device === "webgpu") {
          try {
            toast("WebGPU不可用，切换WASM模式");
            cfg.device = "wasm"; saveCfg();
          } catch (e2) { lastErr = e2; }
        }
      }
    }
    if (attempt >= MAX_ATTEMPTS) break;
    await new Promise(r => setTimeout(r, 1500)); // 重试前稍等
  }
  modelLoading = false;
  $("#modelDlHint").style.display = "none";
  setStatus("模型下载失败（请检查网络后重试）", "bad");
  // 排队消息全部标记失败
  pendingSends = [];
  const errMsg = (lastErr?.message || lastErr || "").slice(0, 120);
  throw new Error("所有模型源均失败: " + errMsg);
}
function onProgress(p) {
  if (p.status === "progress" && typeof p.progress === "number") {
    const pct = Math.round(p.progress);
    const elapsed = modelLoadStart ? Math.round((Date.now() - modelLoadStart) / 1000) : 0;
    const mm = Math.floor(elapsed / 60), ss = elapsed % 60;
    setStatus("下载模型 " + pct + "%", "loading");
    const t = $("#modelDlText");
    if (t) t.textContent = "下载模型 " + pct + "% · 已用 " + mm + "分" + (ss < 10 ? "0" : "") + ss + "秒";
  }
  else if (p.status === "ready" || p.status === "done") setStatus("准备模型文件…", "loading");
}

async function runModel(messages, onToken) {

    else if (sysMsg.includes("报告模式")) text = "📊 今日工作报告\n📅 日期：2026-07-18\n\n今日工作：巡栏检查、饲料投喂、环境清洁\n发现问题：暂无\n处理措施：无\n明日重点：继续观察猪群健康、确保饲料供应";
    else if (sysMsg.includes("分析模式")) text = "🔍 问题分析\n\n总结：猪群健康监控是最关键的风险点。\n\n建议：\n1️⃣ 加强巡栏频率\n2️⃣ 保持猪舍清洁卫生\n3️⃣ 关注天气变化提前应对";
    else text = "这是本地模型的回复（测试模式）。";
    for (const ch of text) { onToken(text.slice(0, text.indexOf(ch) + 1)); await new Promise(r => setTimeout(r, 3)); }
    return text;
  }
  if (cfg.apiEnabled) return await runModelCloud(messages, onToken);
  const { TextStreamer } = await loadLib();
  const gen = await ensureModel();
  let acc = "";
  const streamer = new TextStreamer(gen.tokenizer, { skip_prompt: true, skip_special_tokens: true, callback_function: (t) => { acc += t; onToken(acc); } });
  await gen(messages, { max_new_tokens: 512, do_sample: false, temperature: 0.7, streamer });
  return acc;
}

  }
  busy = true;
  ta.value = ""; ta.style.height = "auto";
  refreshInputBtns();
  addMsg("user", renderMsg(text));
  pushHistory("user", text);

  const typing = addMsg("ai", typingHtml());
  const bubble = typing.querySelector(".bubble");
  const bubbleContent = bubble.querySelector(".bubble-content");

  const kbItems = useKB ? await dbAll() : [];
  const kbUsed = kbItems.length > 0;
  const refPrefix = kbUsed ? '<div class="ref-tag">参考了知识库</div>' : "";

  const messages = [{ role: "system", content: buildSystem(kbItems) }];
  messages.push(...historyMessages().map(m => ({ role: m.role, content: m.content })));
  messages.push({ role: "user", content: text });

  try {
    const reply = await runModel(messages, acc => { bubbleContent.innerHTML = refPrefix + fmt(acc); scrollBottom(); });
    bubbleContent.innerHTML = refPrefix + renderMsg(reply);
    pushHistory("ai", reply); scrollBottom();
    autoRead(reply);
  } catch (e) {
    const msg = (e.message || e + "").slice(0, 150);
    bubbleContent.innerHTML = "⚠️ 出错了：" + escapeHtml(msg) +
      '<br><span style="color:#86868B;font-size:13px">💡 提示：首次使用需联网下载模型（约200MB），请确保网络畅通。也可去菜单→设置切换镜像源。</span>';
  } finally { busy = false; }
}

  if (!pendingSends.length) return;

// 页面加载时检测语音支持
(function detectVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById("voiceCallBtn");
  const ok = !!SR;
  if (!ok && btn) { btn.classList.add("disabled"); btn.title = "不支持语音识别"; }
  // 把检测结果记到全局，后面显示到状态栏
  window._voiceSupported = ok;
  window._voiceAPIName = SR ? (window.SpeechRecognition ? "SpeechRecognition" : "webkitSpeechRecognition") : "无";
})();

function initVoiceRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;
  voiceRec = new SR();
  // 关键：不设 continuous，让每次识别完后 end 事件重新 start（兼容性最好）
  voiceRec.continuous = false;
  voiceRec.interimResults = false; // 只拿最终结果，减少兼容性问题
  voiceRec.lang = "zh-CN";

  voiceRec.onstart = () => {
    // 识别已启动，设一个超时：如果5秒没结果就提示用户
    if (voiceNoResultTimer) clearTimeout(voiceNoResultTimer);
    voiceNoResultTimer = setTimeout(() => {
      if (voiceChatActive && !voiceChatProcessing) {
        toast("没听到声音，请靠近麦克风试试~");
      }
    }, 5000);
  };

  voiceRec.onresult = (e) => {
    if (voiceNoResultTimer) { clearTimeout(voiceNoResultTimer); voiceNoResultTimer = null; }
    let final = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
    }
    if (final.trim() && !voiceChatProcessing) {
      voiceChatSend(final.trim());
    }
  };

  voiceRec.onerror = (e) => {
    if (e.error === "no-speech" || e.error === "aborted") return;
    if (e.error === "not-allowed") {
      toast("请在浏览器设置中允许麦克风权限");
      if (voiceChatActive) stopVoiceChat();
    } else if (e.error === "network") {
      toast("网络异常，语音识别不可用");
    } else if (e.error === "audio-capture") {
      toast("找不到麦克风，请检查设备");
    } else {
      console.warn("[语音]", e.error);
    }
  };

  voiceRec.onend = () => {
    if (voiceNoResultTimer) { clearTimeout(voiceNoResultTimer); voiceNoResultTimer = null; }
    if (voiceRestartTimer) { clearTimeout(voiceRestartTimer); voiceRestartTimer = null; }
    // 语音模式中且AI没在回复 → 自动重启拾音
    if (voiceChatActive && !voiceChatProcessing) {
      voiceRestartTimer = setTimeout(() => {
        if (voiceChatActive && !voiceChatProcessing) {
          try {
            voiceRec.start();
            $("#voiceCallBtn").classList.add("listening");
          } catch (_) {}
        }
      }, 400);
    }
  };
  return true;
}

async function startVoiceChat() {
  if (!cfg.modelChosen) { promptChooseModel(); return; }
  if (!voiceRec && !initVoiceRecognition()) {
    // 给出具体浏览器提示
    const isiOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
    const isWechat = /MicroMessenger/.test(navigator.userAgent);
    if (isiOS && isWechat) toast("微信内不支持语音，请用 Safari 浏览器打开");
    else if (isiOS) toast("iOS Safari 需 iOS 16.4+，设置→Safari→开启「语音识别」");
    else toast("当前浏览器不支持语音识别，请用 Chrome");
    return;
  }

  voiceChatActive = true;
  voiceChatProcessing = false;
  try {
    // 直接 start，SpeechRecognition 自己会触发麦克风权限请求
    voiceRec.start();
    $("#voiceCallBtn").classList.add("listening");
    $("#voiceCallBtn").classList.remove("voice-chat-active");
    $("#voiceCallBtn").innerHTML = HANGUP_ICON_SVG;
    toast("🎤 正在听，说吧~");
  } catch (e) {
    voiceChatActive = false;
    toast("启动语音失败，刷新试试");
  }
}

function stopVoiceChat() {
  voiceChatActive = false;
  voiceChatProcessing = false;
  cancelSpeech();
  if (voiceRestartTimer) { clearTimeout(voiceRestartTimer); voiceRestartTimer = null; }
  if (voiceNoResultTimer) { clearTimeout(voiceNoResultTimer); voiceNoResultTimer = null; }
  try { voiceRec && voiceRec.stop(); } catch (_) {}
  $("#voiceCallBtn").classList.remove("voice-chat-active", "listening");
  $("#voiceCallBtn").innerHTML = PHONE_ICON_SVG;
  $("#input").value = "";
  $("#input").style.height = "auto";
  toast("语音已关闭");
}

/* 语音聊天专用发送：识别到完整语句 → 发AI → 语音朗读回复 → 恢复拾音 */
async function voiceChatSend(text) {
  if (voiceChatProcessing) return;
  voiceChatProcessing = true;

  // 暂停拾音（避免收到AI语音播报产生回环）
  try { voiceRec.stop(); } catch (_) {}

  // 清空输入框临时内容
  $("#input").value = "";
  $("#input").style.height = "auto";

  // 添加用户消息
  addMsg("user", renderMsg(text));
  pushHistory("user", text);

  // AI正在输入
  const typing = addMsg("ai", typingHtml());
  const bubble = typing.querySelector(".bubble");
  const bubbleContent = bubble.querySelector(".bubble-content");

  const kbItems = useKB ? await dbAll() : [];
  const kbUsed = kbItems.length > 0;
  const refPrefix = kbUsed ? '<div class="ref-tag">参考了知识库</div>' : "";
  const messages = [{ role: "system", content: buildSystem(kbItems) }];
  messages.push(...historyMessages().map(m => ({ role: m.role, content: m.content })));
  messages.push({ role: "user", content: text });

  try {
    const reply = await runModel(messages, acc => { bubbleContent.innerHTML = refPrefix + fmt(acc); scrollBottom(); });
    bubbleContent.innerHTML = refPrefix + renderMsg(reply);
    pushHistory("ai", reply); scrollBottom();
    // 语音朗读AI回复，朗读结束后恢复拾音
    speakTextForVoiceChat(stripHtml(renderMsg(reply)));
  } catch (e) {
    const msg = (e.message || e + "").slice(0, 150);
    bubbleContent.innerHTML = "⚠️ 出错了：" + escapeHtml(msg) +
      '<br><span style="color:#86868B;font-size:13px">💡 提示：首次使用需联网下载模型（约200MB），请确保网络畅通。</span>';
    voiceChatProcessing = false;
    // 出错也要恢复拾音
    if (voiceChatActive) { resumeVoiceRec(); }
  }
}

/* 恢复语音拾音（自动处理按钮状态） */
function resumeVoiceRec() {
  if (!voiceChatActive || voiceChatProcessing) return;
  try {
    voiceRec.start();
    $("#voiceCallBtn").classList.add("listening");
    $("#voiceCallBtn").classList.remove("voice-chat-active");
  } catch (_) {
    // 启动失败可能因为浏览器限制，静默处理
  }
}

/* 语音聊天专用朗读：朗读结束后自动恢复拾音 */
function speakTextForVoiceChat(text) {
  if (!("speechSynthesis" in window) || !text) {
    voiceChatProcessing = false;
    if (voiceChatActive) { resumeVoiceRec(); }
    return;
  }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "zh-CN"; u.rate = 1.15; u.pitch = 0.95; u.volume = 1.0;
  const v = selectBestVoice(); if (v) u.voice = v;
  u.onend = () => {
    voiceChatProcessing = false;
    if (voiceChatActive) { resumeVoiceRec(); }
  };
  u.onerror = () => {
    voiceChatProcessing = false;
    if (voiceChatActive) { resumeVoiceRec(); }
  };
  window.speechSynthesis.speak(u);
}

/* ============ 历史渲染（侧边栏内） ============ */
function groupLabel(ts) {
  const now = new Date(); const d = new Date(ts);
  if (d.toDateString() === now.toDateString()) return "今天";
  if (d.toDateString() === new Date(now - 86400000).toDateString()) return "昨天";
  if (d >= new Date(now - 7 * 86400000)) return "本周";
  return "更早";
}
function renderSideList() {
  const list = $("#sideList");
  if (!sessions.length) { list.innerHTML = '<div class="side-empty">暂无历史会话</div>'; return; }
  const sorted = [...sessions].sort((a, b) => b.updatedAt - a.updatedAt);
  const groups = {};
  sorted.forEach(s => { const g = groupLabel(s.updatedAt); if (!groups[g]) groups[g] = []; groups[g].push(s); });
  const order = ["今天", "昨天", "本周", "更早"];
  let html = "";
  order.forEach(g => {
    if (!groups[g] || !groups[g].length) return;
    html += `<div class="side-group-label">${g}</div>`;
    groups[g].forEach(s => {
      const title = (s.title || "新对话").replace(/</g, "&lt;");
      const last = s.messages.length ? s.messages[s.messages.length - 1] : null;
      const preview = last ? (last.content || "").replace(/<[^>]+>/g, "").replace(/\s+/g, " ").trim().slice(0, 30) : "";
      const time = new Date(s.updatedAt).toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
      html += `<div class="side-session" data-sid="${s.id}">
        <div class="ss-top"><span class="ss-title">${title}</span><button class="ss-del" data-del="${s.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button></div>
        ${preview ? '<div class="ss-preview">' + preview.replace(/</g, "&lt;") + '</div>' : ''}
        <div class="ss-time">${time}</div>
      </div>`;
    });
  });
  list.innerHTML = html;
  list.querySelectorAll(".side-session").forEach(el => {
    el.onclick = (e) => { if (e.target.closest(".ss-del")) return; switchSession(el.dataset.sid); closeSide(); };
  });
  list.querySelectorAll(".ss-del").forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); if (!confirm("确定删除这个会话？")) return; deleteSession(btn.dataset.del); };
  });
}

  } catch (e) { toast("❌ " + (e.message || e).slice(0, 100)); }

};

/* ============ Toast & Status ============ */
function toast(msg) { const t = $("#toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2200); }
function setStatus(text, state) { $("#statusText").textContent = text; dot.className = "dot" + (state ? " " + state : ""); dot.title = text; }

  if (!cfg.modelChosen) { setStatus("未选择模型 · 点顶部「请选择模型」", "loading"); }

  if (!cfg.apiEnabled && cfg.modelChosen) { loadLib().catch(() => {}); }
}
/* ============ iOS PWA 底部 anchor 方案 ============ */
// 两步强制兜底：
//   1. translateY 主动偏移：计算底部容器实际位置与可视区底部的间隙，用 translateY 往上拉贴键盘
//   2. scrollTop 封底：输入框聚焦时强制滚动容器到最底部，抵消 iOS 自动上滚
function isTargetDevice() {
  if (!/iPhone|iPad|iPod/.test(navigator.userAgent)) return false;
  var w = window.screen.width, h = window.screen.height;
  var min = Math.min(w, h), max = Math.max(w, h);
  return (min === 393 && max === 852) || (min === 402 && max === 874);
}
var _shouldFix = isTargetDevice();
// 重置底部偏移（恢复 CSS 默认的 translateZ(0)）
function resetBAOffset() {
  var ba = document.getElementById("bottomArea");
  if (ba) ba.style.transform = "";
}
function forceBottomFix() {
  if (!_shouldFix) return;
  var vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
  var wrapper = document.getElementById("appWrapper");
  if (wrapper) wrapper.style.height = vh + "px";
  document.body.style.overflow = "hidden";
  // 第一步：测量底部容器实际底部位置，计算间隙，translateY 往上拽
  var ba = document.getElementById("bottomArea");
  if (!ba) return;
  var r = ba.getBoundingClientRect();
  var gap = vh - r.bottom;
  if (gap > 2) {
    // 有间隙 → translateY 拉上去（同时保持 translateZ(0) 硬件分层）
    ba.style.transform = "translateZ(0) translateY(" + (-gap) + "px)";
  } else {
    // 已贴底 → 清除偏移，回归 CSS 默认的 translateZ(0)
    ba.style.transform = "";
  }
}
// 持续动态校准 → 300ms 轮询
var fixTimer = setInterval(forceBottomFix, 300);
window.addEventListener("DOMContentLoaded", forceBottomFix);
window.addEventListener("load", forceBottomFix);
setTimeout(forceBottomFix, 50);
setTimeout(forceBottomFix, 200);
setTimeout(forceBottomFix, 800);
setTimeout(forceBottomFix, 2000);
window.addEventListener("resize", forceBottomFix);
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", forceBottomFix);
  window.visualViewport.addEventListener("scroll", forceBottomFix);
}
// 第二步：输入框聚焦 → scrollTop 封底 + scrollIntoView 兜底
document.addEventListener("focusin", function(e) {
  if (!_shouldFix) return;
  if (e.target.tagName !== "TEXTAREA" && e.target.tagName !== "INPUT") return;
  // 立刻修正容器高度（不操作滚动，避免和 iOS 原生上滚打架）
  forceBottomFix();
  // 等 iOS 自动上滚动画结束（约 400ms），再做一次最终校正
  var wrapper = document.getElementById("appWrapper");
  var ba = document.getElementById("bottomArea");
  setTimeout(function() {
    if (wrapper) wrapper.scrollTop = wrapper.scrollHeight;
    forceBottomFix();
  }, 400);
  setTimeout(function(){ forceBottomFix(); }, 700);
});
document.addEventListener("focusout", function(e) {
  if (!_shouldFix) return;
  if (e.target.tagName !== "TEXTAREA" && e.target.tagName !== "INPUT") return;
  setTimeout(function(){ resetBAOffset(); forceBottomFix(); }, 100);
  setTimeout(forceBottomFix, 300);
  setTimeout(forceBottomFix, 600);
});
init();

/* ============ PWA SW ============ */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then(reg => {
      reg.addEventListener("updatefound", () => {
        const sw = reg.installing;
        if (sw) sw.addEventListener("statechange", () => {
          // 新 SW 已安装且有旧 SW 在控 → 自动刷新加载新版
          if (sw.state === "installed" && navigator.serviceWorker.controller) {
            location.reload();
          }
        });
      });
      // 每 30 秒检查一次更新（确保用户及时拿到新版）
      setInterval(() => reg.update().catch(() => {}), 30000);
    }).catch(() => {});
  });
}
